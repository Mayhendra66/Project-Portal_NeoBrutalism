<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="wrap">

    <!-- ===== HEADER ===== -->
    <header class="topbar">
      <div class="brand">
        <a class="brand-mark" href="../index.html" title="Balik ke Portal">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z" fill="currentColor"/>
          </svg>
        </a>
        <div class="brand-text">
          <h1>Todo<span>App</span></h1>
          <p class="tagline">task manager ✦ kelarin satu-satu, jangan numpuk</p>
        </div>
      </div>

      <button class="btn btn-primary" id="openAddModalBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        New Task
      </button>
    </header>

    <!-- ===== REMINDER BANNER ===== -->
    <div class="reminder-bar hidden" id="reminderBar">
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.7 21a2 2 0 01-3.4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p id="reminderText">Ada deadline yang udah deket!</p>
      <div class="reminder-actions">
        <button class="reminder-mute" id="muteReminderBtn" title="Matiin pengingat">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="reminder-dismiss" id="dismissReminderBtn" title="Tutup">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ===== STATS ===== -->
    <section class="stats">
      <div class="stat-card stat-yellow rotate-l">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2.5"/>
            <path d="M8 11l2.5 2.5L16 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total Task</div>
      </div>

      <div class="stat-card stat-green rotate-r">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="stat-value" id="statDone">0</div>
        <div class="stat-label">Selesai</div>
      </div>

      <div class="stat-card stat-pink rotate-l">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="stat-value" id="statOverdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>

      <div class="stat-card stat-blue rotate-r">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3v18h18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="7" y="12" width="3" height="6" fill="currentColor"/>
            <rect x="12" y="8" width="3" height="10" fill="currentColor"/>
            <rect x="17" y="5" width="3" height="13" fill="currentColor"/>
          </svg>
        </div>
        <div class="stat-value" id="statRate">0<span class="stat-sub">%</span></div>
        <div class="stat-label">Completion Rate</div>
      </div>
    </section>

    <!-- ===== CHART PANEL (Bonus: Chart Progress) ===== -->
    <section class="panel chart-panel">
      <div class="panel-head">
        <h2>Task Selesai per Hari</h2>
        <span class="chip chip-purple">7 hari terakhir</span>
      </div>
      <div class="chart-box">
        <canvas id="progressChart" height="110"></canvas>
      </div>
    </section>

    <!-- ===== FILTER BAR ===== -->
    <section class="panel filter-panel">
      <div class="filter-row">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Cari task...">
        </div>

        <div class="filter-chips" id="statusFilterChips">
          <button class="filter-chip active" data-filter="all">Semua</button>
          <button class="filter-chip" data-filter="todo">Todo</button>
          <button class="filter-chip" data-filter="doing">Doing</button>
          <button class="filter-chip" data-filter="done">Done</button>
        </div>

        <select id="deadlineFilter" class="deadline-select">
          <option value="all">Semua Deadline</option>
          <option value="overdue">Overdue</option>
          <option value="today">Hari Ini</option>
          <option value="upcoming">Akan Datang</option>
          <option value="none">Tanpa Deadline</option>
        </select>
      </div>
    </section>

    <!-- ===== KANBAN BOARD ===== -->
    <section class="board">

      <div class="board-col" data-status="todo">
        <div class="board-col-head col-head-blue">
          <span class="col-dot"></span>
          <h3>To Do</h3>
          <span class="chip chip-mini" id="countTodo">0</span>
        </div>
        <div class="board-dropzone" id="dropzone-todo"></div>
      </div>

      <div class="board-col" data-status="doing">
        <div class="board-col-head col-head-orange">
          <span class="col-dot"></span>
          <h3>Doing</h3>
          <span class="chip chip-mini" id="countDoing">0</span>
        </div>
        <div class="board-dropzone" id="dropzone-doing"></div>
      </div>

      <div class="board-col" data-status="done">
        <div class="board-col-head col-head-green">
          <span class="col-dot"></span>
          <h3>Done</h3>
          <span class="chip chip-mini" id="countDone">0</span>
        </div>
        <div class="board-dropzone" id="dropzone-done"></div>
      </div>

    </section>

  </div>

  <div class="modal-overlay hidden" id="taskModalOverlay">
  <div class="modal-box">
    
    <div class="modal-head">
      <h2 id="modalTitle">New Task</h2>
      <button type="button" class="icon-btn close-btn" id="closeModalBtn" aria-label="Tutup Modal">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <form id="taskForm" class="modal-form">
      <input type="hidden" id="taskId">

      <div class="field">
        <label for="taskTitle" class="field-label">Judul Task</label>
        <input type="text" id="taskTitle" placeholder="cth: Kerjain laporan PKL" required>
      </div>

      <div class="field">
        <label for="taskDesc" class="field-label">Deskripsi (opsional)</label>
        <textarea id="taskDesc" rows="3" placeholder="Detail tambahan..."></textarea>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="taskStatus" class="field-label">Status</label>
          <select id="taskStatus">
            <option value="todo">To Do</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="field">
          <label for="taskDeadline" class="field-label">Deadline</label>
          <input type="date" id="taskDeadline">
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelModalBtn">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan Task</button>
      </div>
    </form>

  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="script.js"></script>
</body>
</html>
